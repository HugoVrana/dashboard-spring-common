stages:
  - build
  - publish

variables:
  MAVEN_CLI_OPTS: "-B -Dmaven.test.skip=true"

cache:
  key: m2
  paths:
    - .m2/repository

before_script:
  # Minimal Maven settings for GitLab Registry auth via CI_JOB_TOKEN
  - mkdir -p ~/.m2
  - |
    cat > ~/.m2/settings.xml <<'XML'
    <settings>
      <servers>
        <server>
          <id>gitlab-maven</id>
          <username>gitlab-ci-token</username>
          <password>${env.CI_JOB_TOKEN}</password>
        </server>
      </servers>
    </settings>
    XML

build:
  stage: build
  script:
    - mvn $MAVEN_CLI_OPTS clean package

publish:
  stage: publish
  # Typically publish only from default branch and tags (versioned releases)
  rules:
    - if: '$CI_COMMIT_TAG'        # publish on tags
    - if: '$CI_COMMIT_BRANCH == "main"'  # and/or default branch if you want SNAPSHOTs
  script:
    - mvn $MAVEN_CLI_OPTS deploy
