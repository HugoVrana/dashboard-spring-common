stages:
  - build
  - publish

# Pick ONE: 17 or 21. (Uncomment the one you need)
image: maven:3.9.9-eclipse-temurin-17
# image: maven:3.9.9-eclipse-temurin-21

variables:
  MAVEN_CLI_OPTS: "-B -DskipTests"
  # Speeds up Maven + makes logs smaller
  MAVEN_OPTS: "-Dmaven.repo.local=/builds/${CI_PROJECT_PATH}/.m2/repository"

cache:
  key: m2
  paths:
    - .m2/repository

# Auth for GitLab Maven Registry using CI_JOB_TOKEN
.before_maven: &before_maven
  before_script:
    - mkdir -p ~/.m2
    - |
      cat > ~/.m2/settings.xml <<'XML'
      <settings>
        <servers>
          <server>
            <!-- Must match the <id> in distributionManagement -->
            <id>gitlab-maven</id>
            <username>gitlab-ci-token</username>
            <password>${CI_JOB_TOKEN}</password>
          </server>
        </servers>
      </settings>
      XML

build:
  stage: build
  <<: *before_maven
  script:
    - mvn $MAVEN_CLI_OPTS clean package
  artifacts:
    when: always
    paths:
      - target/
    expire_in: 1 week

publish:
  stage: publish
  needs: ["build"]
  rules:
    # publish on tags (recommended); optionally allow main for SNAPSHOTs
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "main"'
  <<: *before_maven
  script:
    - mvn -B deploy