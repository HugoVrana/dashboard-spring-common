stages:
  - build
  - deploy

variables:
  MAVEN_CLI_OPTS: "-B -V -DskipTests"

build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-21
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - mvn clean package
  artifacts:
    paths:
      - target/*.jar

deploy_release:
  stage: deploy
  image: maven:3.9.6-eclipse-temurin-21
  needs: ["build"]
  rules:
    # tags → release
    - if: '$CI_COMMIT_TAG'
    # main → release (optional; keep if you publish from main)
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - mvn $MAVEN_CLI_OPTS -s ci_settings.xml deploy