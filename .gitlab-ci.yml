stages:
  - build
  - deploy

variables:
  MAVEN_CLI_OPTS: "-B -V -DskipTests"

build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-21
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - mvn clean package
  artifacts:
    paths:
      - target/*.jar

deploy_preview:
  stage: deploy
  image: maven:3.9.6-eclipse-temurin-21
  needs: ["build"]
  rules:
    # run only for merge request pipelines
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - >
      mvn $MAVEN_CLI_OPTS
      -s ci_settings.xml
      deploy
      -DaltDeploymentRepository=gitlab-maven::default::${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/maven

deploy_release:
  stage: deploy
  image: maven:3.9.6-eclipse-temurin-21
  needs: ["build"]
  rules:
    # tags → release
    - if: '$CI_COMMIT_TAG'
    # main → release (optional; keep if you publish from main)
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "CI_API_V4_URL=${CI_API_V4_URL}"
    - echo "CI_PROJECT_ID=${CI_PROJECT_ID}"
    - test -n "${CI_JOB_TOKEN}" && echo "CI_JOB_TOKEN present" || echo "CI_JOB_TOKEN missing"

    - mvn -s ci_settings.xml -X help:effective-settings | sed -n '/<servers>/,/<\/servers>/p'
    - mvn $MAVEN_CLI_OPTS -s ci_settings.xml deploy